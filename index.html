<!DOCTYPE html>
<html lang="en">
<head>
  <title>Collapse</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      width: 350px;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }
  </style>
</head>

<body>

<div class="box">

  <h4>About Me</h4>

  <p>
    I am a web developer who loves designing simple UI.
  </p>

  <!-- Hidden Content -->
  <div id="more" class="collapse">
    <p>
      I have skills in HTML, CSS, JavaScript and Bootstrap. 
      I enjoy building responsive and user-friendly websites.
    </p>
  </div>

  <!-- Toggle Button -->
  <button class="btn btn-primary" data-toggle="collapse" data-target="#more">
    Show More
  </button>

</div>

</body>
</html>
